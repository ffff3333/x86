name: OpenWrt 25.12 x86_64

on:
  repository_dispatch:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 10 * * 5'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
              bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
              g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
              libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
              libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp ninja-build \
              p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
              python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
              upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -qq autoremove --purge && sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "${TZ}"
          sudo mkdir -p /workdir
          sudo chown $USER:$USER /workdir

      - name: Clone OpenWrt source
        working-directory: /workdir
        run: |
          git clone --depth=1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/dl
          key: openwrt-dl-${{ env.REPO_BRANCH }}-${{ github.sha }}
          restore-keys: openwrt-dl-${{ env.REPO_BRANCH }}-

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: openwrt-ccache-x86-vm-25.12
          max-size: 8G
          create-symlink: true

      - name: Load custom feeds
        run: |
          [ -f diy-part1.sh ] && chmod +x diy-part1.sh && cd openwrt && $GITHUB_WORKSPACE/diy-part1.sh || true

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply build profile (VM optimized)
        run: |
          [ -f build-profile.sh ] && chmod +x build-profile.sh && cd openwrt && $GITHUB_WORKSPACE/build-profile.sh

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8 || make download -j4
          find dl -size -1024c -delete

      - name: Compile firmware
        run: |
          cd openwrt
          echo "Compiling with $(nproc) threads + ccache for VM soft router..."
          make -j$(nproc) || make -j1 V=s || make -j1 V=s

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME || echo "generic" > DEVICE_NAME
          echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize firmware
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/x86/64
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Generate manifest (VM usage notes)
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd ${{ env.FIRMWARE }}
          cat > manifest.txt << EOF
          OpenWrt 25.12 x86_64 VM Soft Router
          Features: Passwall2 + OpenClash + banip + adblock-fast + SQM/Cake + qemu-guest-agent
          Built: $(date)
          Branch: ${{ env.REPO_BRANCH }}
          SHA: ${{ github.sha }}
          Usage Tip: After install, expand root partition and install qemu-guest-agent if not present.
          EOF
          md5sum *.img *.squashfs *.gz 2>/dev/null >> manifest.txt || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_25.12_x86_64_VM_SoftRouter${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Upload to GitHub Release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ github.run_number }}-${{ env.FILE_DATE }}
          body_path: ${{ env.FIRMWARE }}/manifest.txt
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true'
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
